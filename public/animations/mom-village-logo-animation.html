<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mom Village Logo Animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
body{
    margin:0;
    background:#efefef;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#stage{
    width:900px;
    height:900px;
    position:relative;
}

svg{
    width:100%;
    height:100%;
}

.word{
    fill:#000;
    font-size:92px;
    opacity:0;
    font-family:"Sacramento",cursive;
}

.subtitle{
    fill:#111;
    font-size:32px;
    opacity:0;
}

#symbolGroup,
#monogramGroup{
    transform-box:fill-box;
    transform-origin:center;
}
</style>
</head>
<body>

<div id="stage">

<svg viewBox="0 0 900 900">

    <!-- stage 1 symbol -->
    <g id="symbolGroup">
        <path
            d="M300 620
               L300 430"
            fill="none"
            stroke="black"
            stroke-width="16"
        />
        <path
            d="M480 620
               L480 430"
            fill="none"
            stroke="black"
            stroke-width="16"
        />
        <path
            d="M285 430
               L390 200
               L495 430"
            fill="none"
            stroke="black"
            stroke-width="16"
        />
        <path
            d="M300 430
               L390 570
               L480 430"
            fill="none"
            stroke="black"
            stroke-width="16"
        />
    </g>

    <!-- stage 3 monogram -->
    <g id="monogramGroup" opacity="0">
        <path
            d="M210 430
               L210 260
               L300 405
               L390 260
               L390 430"
            fill="none"
            stroke="black"
            stroke-width="18"
        />
        <path
            d="M210 450
               L300 690
               L390 450"
            fill="none"
            stroke="black"
            stroke-width="18"
        />
    </g>

    <!-- text pieces -->
    <text id="illage" class="word" x="430" y="430">illage</text>
    <text id="om" class="word" x="430" y="520">om</text>

    <!-- subtitle -->
    <text
        id="subtitle"
        class="subtitle"
        x="450"
        y="770"
        text-anchor="middle">
        A village of moms, for moms
    </text>

</svg>

</div>

<script>

gsap.set("#illage",{x:120,opacity:0});
gsap.set("#om",{x:-80,opacity:0});
gsap.set("#symbolGroup",{opacity:0});
gsap.set("#monogramGroup",{opacity:0,x:-210,y:-40});

const tl = gsap.timeline();

tl

/* photo 1 hold */
.to("#symbolGroup",{
    opacity:1,
    duration:0.9
})

.to({}, {duration:1.3})

/* photo 2 */
.to("#symbolGroup",{
    x:-170,
    y:40,
    scale:0.68,
    duration:1.35,
    ease:"power2.inOut"
})

.to("#illage",{
    x:0,
    opacity:1,
    duration:1.35,
    ease:"power2.out"
},"<")

.to("#om",{
    x:0,
    opacity:1,
    duration:1.35,
    ease:"power2.out"
},"<")

.to({}, {duration:0.8})

/* transform to photo 3 */

.to("#symbolGroup",{
    x:-210,
    y:-40,
    scale:0.58,
    duration:1.35,
    ease:"power3.inOut"
})

.to("#monogramGroup",{
    opacity:1,
    duration:1,
    ease:"power2.out"
},"<")

.to("#om",{
    y:-70,
    duration:1.35
},"<")

.to("#illage",{
    y:160,
    duration:1.35
},"<")

/* subtitle fade */

.to("#subtitle",{
    opacity:1,
    y:-18,
    duration:0.85,
    ease:"power2.out"
});

</script>

</body>
</html>

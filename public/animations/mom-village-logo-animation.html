<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mom Village Logo Animation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
body{
    margin:0;
    background:#efefef;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#stage{
    width:900px;
    height:900px;
    position:relative;
}

svg{
    width:100%;
    height:100%;
}

.word{
    fill:#000;
    font-size:72px;
    opacity:0;
}

.subtitle{
    fill:#111;
    font-size:32px;
    opacity:0;
}

#mGroup,
#vGroup{
    transform-box:fill-box;
    transform-origin:center;
}
</style>
</head>
<body>

<div id="stage">

<svg viewBox="0 0 900 900">

    <!-- M -->
    <g id="mGroup">
        <path
            d="M250 600
               L250 350
               L350 550
               L450 350
               L450 600"
            fill="none"
            stroke="black"
            stroke-width="24"
        />
    </g>

    <!-- V -->
    <g id="vGroup">
        <path
            d="M320 350
               L450 650
               L580 350"
            fill="none"
            stroke="black"
            stroke-width="24"
        />
    </g>

    <!-- text pieces -->
    <text id="illage" class="word" x="470" y="450">illage</text>
    <text id="om" class="word" x="470" y="560">om</text>

    <!-- subtitle -->
    <text
        id="subtitle"
        class="subtitle"
        x="450"
        y="760"
        text-anchor="middle">
        A village of moms, for moms
    </text>

</svg>

</div>

<script>

gsap.set("#illage",{x:120,opacity:0});
gsap.set("#om",{x:-80,opacity:0});

const tl = gsap.timeline();

tl

/* photo 1 hold */
.from("#mGroup",{
    opacity:0,
    duration:0.8
})
.from("#vGroup",{
    opacity:0,
    duration:0.8
},"<")

.to({}, {duration:1})

/* photo 2 */
.to("#mGroup",{
    x:-120,
    duration:1.2,
    ease:"power2.inOut"
})

.to("#vGroup",{
    x:-120,
    duration:1.2,
    ease:"power2.inOut"
},"<")

.to("#illage",{
    x:0,
    opacity:1,
    duration:1.2,
    ease:"power2.out"
},"<")

.to("#om",{
    x:0,
    opacity:1,
    duration:1.2,
    ease:"power2.out"
},"<")

.to({}, {duration:0.5})

/* transform to photo 3 */

.to("#vGroup",{
    rotation:180,
    y:220,
    duration:1.2,
    ease:"power3.inOut"
})

.to("#mGroup",{
    y:-140,
    duration:1.2,
    ease:"power3.inOut"
},"<")

.to("#om",{
    y:-120,
    duration:1.2
},"<")

.to("#illage",{
    y:120,
    duration:1.2
},"<")

/* subtitle fade */

.to("#subtitle",{
    opacity:1,
    y:-15,
    duration:0.8,
    ease:"power2.out"
});

</script>

</body>
</html>
